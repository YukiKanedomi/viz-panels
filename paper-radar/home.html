<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>論文レーダー</title>
<style>
:root{--bg:#faf9f5;--ink:#1d2127;--mut:#6c7078;--accent:#1a5e54;--line:#e7e4db;--soft:#f2f0e9}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:36px 24px 80px}
.brand{font-size:11.5px;font-family:"Yu Gothic UI",sans-serif;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);font-weight:700}
h1{font-size:37px;line-height:1.18;margin:9px 0 6px;letter-spacing:.01em}
.tag{font-size:15px;color:var(--mut)}
.sec{font-family:"Yu Gothic UI",sans-serif;font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:42px 0 14px;display:flex;align-items:center;gap:13px}
.sec::after{content:"";flex:1;height:1px;background:var(--line)}
.today{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 22px 12px;box-shadow:0 8px 24px rgba(29,33,39,.045)}
.today .date{font-family:"Yu Gothic UI",sans-serif;font-size:12.5px;color:var(--mut);font-weight:700;letter-spacing:.04em;margin-bottom:4px}
.today h2{font-size:22px;margin-bottom:12px}
.tg{font-family:"Yu Gothic UI",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:800;margin:16px 0 4px;padding-top:10px;border-top:1px solid var(--line)}
.pl{display:block;text-decoration:none;color:inherit;padding:11px 2px;border-bottom:1px solid var(--soft)}
.pl:last-child{border-bottom:none}
.pl .pt{font-size:16px;font-weight:600;line-height:1.5}
.pl .pm{font-family:"Yu Gothic UI",sans-serif;font-size:12px;color:var(--mut);margin-top:3px}
.chip2{display:inline-block;font-family:"Yu Gothic UI",sans-serif;font-size:10.5px;font-weight:800;border-radius:999px;padding:2px 9px;margin-right:6px}
.c-def{background:var(--accent);color:#fff}.c-new{border:1px solid var(--accent);color:var(--accent)}.c-oa{border:1px solid var(--line);color:var(--mut)}
.search{width:100%;font-family:"Yu Gothic UI",sans-serif;font-size:15px;padding:11px 15px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:10px}
.filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.f{cursor:pointer;font-family:"Yu Gothic UI",sans-serif;font-size:12px;border:1px solid var(--line);background:#fff;color:var(--mut);border-radius:999px;padding:6px 12px}
.f.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.cards{grid-template-columns:1fr}}
.card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:0 3px 10px rgba(29,33,39,.035)}
.card .tp{font-family:"Yu Gothic UI",sans-serif;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.card .ct{font-size:15.5px;font-weight:600;line-height:1.5;margin:6px 0 6px}
.card .cm{font-family:"Yu Gothic UI",sans-serif;font-size:11.5px;color:var(--mut)}
.empty{font-family:"Yu Gothic UI",sans-serif;color:var(--mut);text-align:center;padding:24px;grid-column:1/-1}
</style></head><body><div class="wrap">
<div class="brand">Paper Radar</div>
<h1>論文レーダー</h1>
<div class="tag">気になる論文を、やさしく・きれいに届ける</div>

<div class="sec">今日の配信</div>
<div class="today"><div class="date">2026-06-27 号 — 各トピック 2件</div><h2>本日のピックアップ</h2>
<div class="tg">フォイルガス軸受</div>
<a class="pl" href="detail.html"><div class="pt">柔軟フォイル気体軸受の連成解析</div><div class="pm"><span class="chip2 c-def">定番</span><span class="chip2 c-oa">OA</span>Heshmat ほか · 1983</div></a>
<a class="pl" href="#"><div class="pt">ガスフォイル軸受の熱弾性流体潤滑モデル</div><div class="pm"><span class="chip2 c-new">最新</span>2025 · arXiv</div></a>
<div class="tg">ロータダイナミクス</div>
<a class="pl" href="#"><div class="pt">回転体‑軸受系の非線形不釣合い応答</div><div class="pm"><span class="chip2 c-def">定番</span></div></a>
<a class="pl" href="#"><div class="pt">データ駆動による軸受動特性係数の同定</div><div class="pm"><span class="chip2 c-new">最新</span>2026</div></a>
</div>

<div class="sec">アーカイブ</div>
<input class="search" id="q" placeholder="タイトル・著者で検索">
<div class="filters" id="filters"><span class="f on" data-f="all">すべて</span><span class="f" data-f="foil">フォイル軸受</span><span class="f" data-f="rotor">ロータダイナミクス</span></div>
<div class="cards" id="cards"></div>
</div>
<script>
const ARC=[
 {t:"柔軟フォイル気体軸受の連成解析",m:"Heshmat 1983 · 定番",f:"foil",h:"detail.html"},
 {t:"バンプフォイル軸受の動特性係数",m:"2019",f:"foil",h:"#"},
 {t:"ガスフォイル軸受の熱弾性流体潤滑モデル",m:"2025 · arXiv",f:"foil",h:"#"},
 {t:"回転体‑軸受系の安定性解析",m:"Lund 1974 · 定番",f:"rotor",h:"#"},
 {t:"シール流体力のロータダイナミクス",m:"2021",f:"rotor",h:"#"},
 {t:"データ駆動による軸受動特性係数の同定",m:"2026",f:"rotor",h:"#"}];
const TP={foil:"フォイル軸受",rotor:"ロータダイナミクス"};
const cards=document.getElementById('cards');let flt="all",qq="";
function render(){const list=ARC.filter(a=>(flt=="all"||a.f==flt)&&(!qq||(a.t+a.m).toLowerCase().includes(qq)));cards.innerHTML=list.length?list.map(a=>`<a class="card" href="${a.h}"><div class="tp">${TP[a.f]}</div><div class="ct">${a.t}</div><div class="cm">${a.m}</div></a>`).join(''):'<div class="empty">該当なし</div>';}
document.getElementById('q').oninput=e=>{qq=e.target.value.toLowerCase();render()};
document.querySelectorAll('.f').forEach(f=>f.onclick=()=>{document.querySelectorAll('.f').forEach(x=>x.classList.remove('on'));f.classList.add('on');flt=f.dataset.f;render()});
render();
</script>
</body></html>
