<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>viz-panels — 可視化ハブ</title>
<style>
:root{--bg:#0f1220;--card:#181c2e;--ink:#eef1f8;--mut:#9aa3bd;--ind:#7c8cff;--teal:#2dd4bf;--line:#2a2f47;--amber:#f5b042}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,#0f1220,#141a30);color:var(--ink);min-height:100vh;
 font-family:"Yu Gothic UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;-webkit-font-smoothing:antialiased;
 padding:24px 18px 48px;max-width:720px;margin:0 auto}
header{margin-bottom:8px}
h1{font-size:23px;font-weight:800;letter-spacing:.01em}
.sub{color:var(--mut);font-size:13px;margin-top:4px}
.search{width:100%;margin:18px 0 6px;padding:11px 14px;background:#0c1023;border:1px solid var(--line);
 border-radius:12px;color:var(--ink);font-size:15px}
.grp{margin-top:22px}
.gh{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin:0 2px 10px}
a.card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
 border-radius:16px;padding:15px 16px;margin-bottom:11px;transition:.12s}
a.card:active{transform:scale(.99)}
.ct{display:flex;align-items:center;gap:9px}
.ct .ttl{font-size:16px;font-weight:800}
.badge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;background:#26304f;color:var(--ind)}
.badge.panel{background:rgba(124,140,255,.16);color:var(--ind)}
.badge.chart{background:rgba(45,212,191,.16);color:var(--teal)}
.badge.report{background:rgba(245,176,66,.16);color:var(--amber)}
.desc{font-size:13px;color:var(--mut);margin-top:6px;line-height:1.6}
.meta{font-size:11.5px;color:#6b7493;margin-top:7px}
.empty{color:var(--mut);font-size:14px;text-align:center;padding:40px 0}
footer{margin-top:30px;color:#6b7493;font-size:11.5px;text-align:center;line-height:1.7}
</style></head>
<body>
<header>
  <h1>🛰️ viz-panels</h1>
  <div class="sub">各プロジェクトの可視化をスマホで確認するハブ</div>
</header>
<input class="search" id="q" placeholder="🔍 検索（タイトル・説明・プロジェクト）">
<div id="list"></div>
<footer>publish: 各プロジェクトのHTMLを <code>&lt;project&gt;/</code> に置き manifest に追記 → push で自動公開<br>YukiKanedomi/viz-panels</footer>
<script>
const TYPE={panel:"設定パネル",chart:"グラフ",report:"レポート",dashboard:"ダッシュボード"};
let ITEMS=[];
fetch('manifest.json?_='+Date.now()).then(r=>r.json()).then(d=>{ITEMS=d.items||[];render('')})
 .catch(()=>{document.getElementById('list').innerHTML='<div class="empty">manifest.json を読めませんでした</div>'});
document.getElementById('q').oninput=e=>render(e.target.value.trim().toLowerCase());
function render(q){
 const f=ITEMS.filter(it=>!q||[it.title,it.desc,it.project].join(' ').toLowerCase().includes(q));
 const byProj={};f.forEach(it=>{(byProj[it.project]=byProj[it.project]||[]).push(it)});
 const el=document.getElementById('list');
 if(!f.length){el.innerHTML='<div class="empty">該当なし</div>';return}
 el.innerHTML=Object.keys(byProj).sort().map(p=>{
  const cards=byProj[p].map(it=>{
   const t=(it.type||'panel');
   return `<a class="card" href="${it.file}">
     <div class="ct"><span class="ttl">${esc(it.title)}</span><span class="badge ${t}">${TYPE[t]||t}</span></div>
     ${it.desc?`<div class="desc">${esc(it.desc)}</div>`:''}
     <div class="meta">${it.added||''}</div></a>`}).join('');
  return `<div class="grp"><div class="gh">${esc(p)}</div>${cards}</div>`}).join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
</script>
</body></html>
