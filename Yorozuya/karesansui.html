<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>枯山水</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:#26221d;
  display:flex;align-items:center;justify-content:center;
  font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  -webkit-user-select:none;user-select:none;
}
#stage{position:relative;display:flex;flex-direction:column;align-items:center}
#tray{
  position:relative;border-radius:6px;padding:14px;
  background:linear-gradient(135deg,#7a5c3d,#5c4227 55%,#6b4f31);
  box-shadow:0 10px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.15), inset 0 -2px 4px rgba(0,0,0,.35);
}
#garden{
  display:block;border-radius:2px;touch-action:none;cursor:crosshair;
  box-shadow:inset 0 0 18px rgba(0,0,0,.28);
}
#sig{position:absolute;pointer-events:none}
#hint{
  position:absolute;left:0;right:0;top:44%;text-align:center;pointer-events:none;
  color:rgba(80,68,50,.65);font-size:13px;letter-spacing:.3em;
  transition:opacity 2.5s;font-family:"Shippori Mincho",serif;
}
#tools{display:flex;gap:8px;margin-top:12px;align-items:center;justify-content:center}
#tools button{
  min-width:50px;min-height:40px;padding:6px 12px;border-radius:4px;cursor:pointer;
  border:1px solid rgba(185,169,136,.25);background:rgba(255,255,255,.04);
  color:#b9a988;font-family:"Shippori Mincho",serif;font-size:13px;letter-spacing:.2em;
}
#tools button.on{background:rgba(185,169,136,.18);border-color:rgba(185,169,136,.6);color:#e8dcc0}
#tools button:active{transform:scale(.96)}
#nogl{color:#b9a988;font-family:"Shippori Mincho",serif;padding:30px;display:none}
</style>
</head>
<body>
<div id="stage">
  <div id="tray">
    <canvas id="garden"></canvas>
    <canvas id="sig"></canvas>
    <div id="hint">指 で 砂 を 撫 で る</div>
    <div id="nogl">この庭には WebGL2 が必要です</div>
  </div>
  <div id="tools">
    <button id="b-rake" class="on">熊手</button>
    <button id="b-stone">石</button>
    <button id="b-ripple">波紋</button>
    <button id="b-smooth">整地</button>
    <button id="b-time">刻</button>
    <button id="b-save">写す</button>
  </div>
</div>
<script>
"use strict";

// ============ シェーダ ============
const VS = `#version 300 es
in vec2 aPos;
out vec2 vUV;
void main(){ vUV = aPos * .5 + .5; gl_Position = vec4(aPos, 0., 1.); }`;

// 高さは RGBA8 に 16bit 相当でパック（h ∈ [-1,1]）
const PACK = `
float unpackH(vec4 c){ return (c.r + c.g / 255.) * 2. - 1.; }
vec4 packH(float h){
  float v = clamp(h * .5 + .5, 0., 1.) * 255.;
  return vec4(floor(v) / 255., fract(v), 0., 1.);
}
float gauss(float x, float s){ return exp(-x * x / (2. * s * s)); }`;

// 彫りスタンプ: 前の高さを読み、筆の領域だけ「置き換える」
const STAMP_FS = `#version 300 es
precision highp float;
in vec2 vUV; out vec4 outC;
uniform sampler2D uPrev;
uniform vec2 uRes, uP0, uP1;
uniform float uMode;      // 0=熊手セグメント 1=波紋 2=整地
uniform float uHalfW, uSpacing, uR0, uRings;
${PACK}

float rakeProfile(float t){
  float h = 0.;
  for (int k = -2; k <= 2; k++){
    h -= .62 * gauss(t - float(k) * uSpacing, 2.3);
  }
  for (int k = -3; k <= 2; k++){
    h += .30 * gauss(t - (float(k) + .5) * uSpacing, 2.9);
  }
  return h;
}

void main(){
  vec2 px = vUV * uRes;
  float prev = unpackH(texture(uPrev, vUV));
  float h = prev;
  if (uMode < .5){
    vec2 d = uP1 - uP0; float L = max(length(d), .001); vec2 dir = d / L;
    vec2 rel = px - uP0;
    float along = dot(rel, dir);
    float t = dot(rel, vec2(-dir.y, dir.x));
    float m = smoothstep(uHalfW + 5., uHalfW - 3., abs(t))
            * smoothstep(-5., 1., along) * smoothstep(L + 5., L - 1., along);
    h = mix(prev, rakeProfile(t), m);
  } else if (uMode < 1.5){
    float rr = length(px - uP0) - uR0;
    float width = uRings * uSpacing;
    if (rr > -4. && rr < width + 6.){
      float local = mod(rr, uSpacing);
      float d1 = min(local, uSpacing - local);
      float prof = -.58 * gauss(d1, 2.3) + .26 * gauss(abs(local - uSpacing * .5), 2.9);
      float fade = smoothstep(width + 4., width - uSpacing, rr) * smoothstep(-4., 2., rr);
      h = mix(prev, prof * (1. - .5 * rr / width), fade);
    }
  } else {
    h = prev * (1. - .25);   // 整地は数回かけてふわっと均す
  }
  outC = packH(h);
}`;

// 照明: 高さの場（砂の彫り＋石）を法線化して太陽で照らす
const LIGHT_FS = `#version 300 es
precision highp float;
in vec2 vUV; out vec4 outC;
uniform sampler2D uHeight;
uniform vec2 uRes;
uniform vec4 uStones[7];       // x, y, r, seed
uniform int uStoneCount;
uniform vec3 uLightDir, uLightColor, uAmbient, uSandColor;
uniform float uSparkle, uMoodSeed;
${PACK}

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3. - 2. * f);
  return mix(mix(hash(i), hash(i + vec2(1, 0)), f.x),
             mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), f.x), f.y);
}
float fbm(vec2 p){
  float v = 0., a = .5;
  for (int i = 0; i < 3; i++){ v += a * vnoise(p); p *= 2.1; a *= .5; }
  return v;
}

float sandH(vec2 px){
  return unpackH(texture(uHeight, px / uRes)) * 7.5;
}
// 石の高さ場と存在マスク
vec2 stoneField(vec2 px){
  float h = 0., mask = 0.;
  for (int i = 0; i < 7; i++){
    if (i >= uStoneCount) break;
    vec4 s = uStones[i];
    float d = length(px - s.xy);
    float k = 1. - smoothstep(0., s.z, d);
    float dome = k * k * (3. - 2. * k);
    float rock = 1. + .15 * fbm(px * .10 + s.w) - .075;
    h += dome * s.z * .5 * rock;
    mask = max(mask, smoothstep(.04, .30, dome));
  }
  return vec2(h, mask);
}
float totalH(vec2 px){
  vec2 st = stoneField(px);
  return sandH(px) * (1. - st.y) + st.x;
}

void main(){
  vec2 px = vUV * uRes;
  float e = 1.4;
  float hC = totalH(px);
  float hX = totalH(px + vec2(e, 0.)) - totalH(px - vec2(e, 0.));
  float hY = totalH(px + vec2(0., e)) - totalH(px - vec2(0., e));
  vec3 n = normalize(vec3(-hX / (2. * e), -hY / (2. * e), 1.));
  vec2 st = stoneField(px);

  // アルベド
  float grain = vnoise(px * .9) - .5;
  vec3 sand = uSandColor * (1. + .10 * grain);
  float darkGrain = step(hash(floor(px * 1.3)), .05);
  sand = mix(sand, sand * .8, darkGrain * .5);
  vec3 rockA = vec3(.52, .52, .48), rockB = vec3(.30, .305, .28);
  vec3 rock = mix(rockA, rockB, fbm(px * .3 + uStones[0].w));
  float mossM = smoothstep(.90, .985, n.z) * smoothstep(.4, .75, fbm(px * .16 + 7.3)) * st.y;
  rock = mix(rock, vec3(.34, .42, .25), mossM * .55);
  vec3 albedo = mix(sand, rock, st.y);

  // 陰影
  vec3 L = normalize(uLightDir);
  float diff = max(dot(n, L), 0.);
  float grooveAO = 1. - clamp(-sandH(px) / 6., 0., 1.) * .30 * (1. - st.y);
  // 石の落ち影: 光と逆側の砂を、石の場をずらし読みして落とす
  float shBlock = stoneField(px + L.xy * 14.).y + stoneField(px + L.xy * 26.).y * .6;
  float shadow = 1. - clamp(shBlock, 0., 1.) * .38 * (1. - st.y);

  vec3 col = albedo * (uAmbient + uLightColor * diff) * grooveAO * shadow;
  col += uLightColor * pow(diff, 8.) * .18 * st.y;   // 石の面のてかり

  // 砂のきらめき（光の向きに合った粒だけが光る）
  float glintMask = step(.994, hash(floor(px * 1.7) + uMoodSeed));
  float glint = pow(diff, 3.) * glintMask * uSparkle * (1. - st.y);
  col += vec3(1., .98, .92) * glint;

  // 端の気配
  vec2 q = vUV - .5;
  col *= 1. - dot(q, q) * .33;

  outC = vec4(pow(col, vec3(.92)), 1.);
}`;

// ============ WebGL 設営 ============
const canvas = document.getElementById("garden");
const gl = canvas.getContext("webgl2", { preserveDrawingBuffer: true, antialias: false });
let W, H, DPR = Math.min(window.devicePixelRatio || 1, 1.5);

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function program(fs){
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, VS));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(p));
  return p;
}
let progStamp, progLight, quad;
let texA, texB, fboA, fboB;     // 高さのピンポン

function makeTarget(w, h){
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  return { t, f };
}

function sizeCanvas(){
  const vw = Math.min(window.innerWidth - 36, 560);
  const vh = window.innerHeight - 150;
  W = Math.max(280, vw); H = Math.max(360, Math.min(vh, W * 1.5));
  if (W > vh * 0.9) H = Math.min(H, vh);
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  canvas.width = W * DPR; canvas.height = H * DPR;
  const a = makeTarget(W, H), b = makeTarget(W, H);
  texA = a.t; fboA = a.f; texB = b.t; fboB = b.f;
  gl.bindFramebuffer(gl.FRAMEBUFFER, fboA);
  gl.viewport(0, 0, W, H);
  gl.clearColor(.5, 0, 0, 1);          // pack(0)
  gl.clear(gl.COLOR_BUFFER_BIT);
}

function initGL(){
  progStamp = program(STAMP_FS);
  progLight = program(LIGHT_FS);
  quad = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
}
function bindQuad(p){
  const loc = gl.getAttribLocation(p, "aPos");
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}
const U = (p, n) => gl.getUniformLocation(p, n);

// 彫りパス（uPrev=texA → fboB → swap）
function stamp(mode, p0, p1, opts){
  gl.useProgram(progStamp); bindQuad(progStamp);
  gl.bindFramebuffer(gl.FRAMEBUFFER, fboB);
  gl.viewport(0, 0, W, H);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, texA);
  gl.uniform1i(U(progStamp, "uPrev"), 0);
  gl.uniform2f(U(progStamp, "uRes"), W, H);
  gl.uniform2f(U(progStamp, "uP0"), p0.x, H - p0.y);   // テクスチャは上下反転
  gl.uniform2f(U(progStamp, "uP1"), p1.x, H - p1.y);
  gl.uniform1f(U(progStamp, "uMode"), mode);
  gl.uniform1f(U(progStamp, "uHalfW"), 24);
  gl.uniform1f(U(progStamp, "uSpacing"), 8);
  gl.uniform1f(U(progStamp, "uR0"), opts && opts.r0 || 0);
  gl.uniform1f(U(progStamp, "uRings"), opts && opts.rings || 5);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  [texA, texB] = [texB, texA]; [fboA, fboB] = [fboB, fboA];
}

// ============ 刻（光） ============
const MOODS = [
  { light:[-0.42,-0.5,0.76], lcol:[1.02,.97,.88], amb:[.46,.45,.42], sand:[.88,.845,.755], sparkle:.55 },
  { light:[-0.85,-0.28,0.44], lcol:[1.04,.79,.58], amb:[.40,.34,.33], sand:[.87,.82,.72], sparkle:.4 },
  { light:[0.5,-0.55,0.67],  lcol:[.5,.62,.92],   amb:[.15,.17,.25], sand:[.37,.41,.53], sparkle:1.0 }
];
let mood = 0;
let stones = [];   // {x,y,r,seed}

function render(){
  gl.useProgram(progLight); bindQuad(progLight);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, texA);
  gl.uniform1i(U(progLight, "uHeight"), 0);
  gl.uniform2f(U(progLight, "uRes"), W, H);
  const arr = new Float32Array(28);
  stones.forEach((s, i) => { if (i < 7){ arr.set([s.x, H - s.y, s.r, s.seed], i * 4); } });
  gl.uniform4fv(U(progLight, "uStones"), arr);
  gl.uniform1i(U(progLight, "uStoneCount"), Math.min(stones.length, 7));
  const m = MOODS[mood];
  gl.uniform3fv(U(progLight, "uLightDir"), m.light);
  gl.uniform3fv(U(progLight, "uLightColor"), m.lcol);
  gl.uniform3fv(U(progLight, "uAmbient"), m.amb);
  gl.uniform3fv(U(progLight, "uSandColor"), m.sand);
  gl.uniform1f(U(progLight, "uSparkle"), m.sparkle);
  gl.uniform1f(U(progLight, "uMoodSeed"), mood * 13.7);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

// ============ 題字と落款（2Dオーバーレイ） ============
const sig = document.getElementById("sig");
function drawSig(){
  sig.style.left = "14px"; sig.style.top = "14px";
  sig.style.width = W + "px"; sig.style.height = H + "px";
  sig.width = W * DPR; sig.height = H * DPR;
  const c = sig.getContext("2d");
  c.setTransform(DPR, 0, 0, DPR, 0, 0);
  c.clearRect(0, 0, W, H);
  const ink = (mood === 2) ? "rgba(200,210,235,.55)" : "rgba(80,68,50,.5)";
  c.font = '15px "Shippori Mincho", serif';
  c.textAlign = "center"; c.fillStyle = ink;
  const x = W - 22; let y = 27;
  for (const ch of "枯山水"){ c.fillText(ch, x, y); y += 19; }
  c.fillStyle = "rgba(178,52,36,.85)";
  c.fillRect(x - 6.5, y - 8, 13, 13);
  c.fillStyle = "rgba(245,238,225,.95)";
  c.font = '9px "Shippori Mincho", serif';
  c.fillText("金", x, y + 2);
}

// ============ 音（砂の声だけ） ============
let actx = null, rakeGain = null, rakeFilter = null;
function initAudio(){
  if (actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    const len = actx.sampleRate * 2;
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = actx.createBufferSource(); src.buffer = buf; src.loop = true;
    rakeFilter = actx.createBiquadFilter(); rakeFilter.type = "bandpass";
    rakeFilter.frequency.value = 1300; rakeFilter.Q.value = 0.9;
    rakeGain = actx.createGain(); rakeGain.gain.value = 0;
    src.connect(rakeFilter).connect(rakeGain).connect(actx.destination);
    src.start();
  } catch(e){ actx = null; }
}
function rakeSound(speed){
  if (!actx) return;
  rakeGain.gain.setTargetAtTime(Math.min(speed / 900, 0.11), actx.currentTime, 0.04);
  rakeFilter.frequency.setTargetAtTime(900 + Math.min(speed, 1200), actx.currentTime, 0.05);
}
function rakeSoundStop(){ if (actx) rakeGain.gain.setTargetAtTime(0, actx.currentTime, 0.09); }
function thud(){
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(110, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, actx.currentTime + 0.12);
  g.gain.setValueAtTime(0.22, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.16);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.18);
}
function sweep(dur){
  if (!actx) return;
  rakeGain.gain.setTargetAtTime(0.06, actx.currentTime, 0.05);
  rakeGain.gain.setTargetAtTime(0, actx.currentTime + dur, 0.15);
}

// ============ 入力 ============
let tool = "rake", drawing = false, last = null, lastT = 0, dragStone = null, hinted = false;
function pos(e){
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function stoneAt(x, y){
  for (let i = stones.length - 1; i >= 0; i--){
    const s = stones[i];
    if (Math.hypot(x - s.x, y - s.y) < s.r * 1.1) return s;
  }
  return null;
}
canvas.addEventListener("pointerdown", e => {
  e.preventDefault(); canvas.setPointerCapture(e.pointerId);
  initAudio();
  if (!hinted){ hinted = true; document.getElementById("hint").style.opacity = 0; }
  const p = pos(e);
  if (tool === "stone"){
    const s = stoneAt(p.x, p.y);
    if (s){ dragStone = s; }
    else if (stones.length < 7){
      stones.push({ x: p.x, y: p.y, r: 30 + Math.random() * 16, seed: Math.random() * 100 });
      thud();
    }
    render(); return;
  }
  if (tool === "ripple"){
    const s = stoneAt(p.x, p.y);
    if (s){ stamp(1, { x: s.x, y: s.y }, { x: s.x, y: s.y }, { r0: s.r * 1.05, rings: 5 }); sweep(0.5); render(); }
    return;
  }
  const s = stoneAt(p.x, p.y);
  if (s){ dragStone = s; return; }
  drawing = true; last = p; lastT = performance.now();
});
canvas.addEventListener("pointermove", e => {
  if (dragStone){
    const p = pos(e);
    dragStone.x = Math.max(20, Math.min(W - 20, p.x));
    dragStone.y = Math.max(20, Math.min(H - 20, p.y));
    render(); return;
  }
  if (!drawing) return;
  const p = pos(e), now = performance.now();
  const d = Math.hypot(p.x - last.x, p.y - last.y);
  if (d < 2.5) return;
  stamp(0, last, p);
  rakeSound(d / Math.max(now - lastT, 1) * 1000);
  last = p; lastT = now;
  render();
});
function endStroke(){ drawing = false; last = null; dragStone = null; rakeSoundStop(); }
canvas.addEventListener("pointerup", endStroke);
canvas.addEventListener("pointercancel", endStroke);

// ============ 道具箱 ============
const btns = { rake: "b-rake", stone: "b-stone", ripple: "b-ripple" };
function setTool(t){
  tool = t;
  for (const k in btns) document.getElementById(btns[k]).classList.toggle("on", k === t);
}
document.getElementById("b-rake").onclick   = () => setTool("rake");
document.getElementById("b-stone").onclick  = () => setTool("stone");
document.getElementById("b-ripple").onclick = () => setTool("ripple");
document.getElementById("b-smooth").onclick = () => {
  initAudio(); sweep(0.8);
  let n = 0;
  (function step(){
    stamp(2, {x:0,y:0}, {x:0,y:0}); render();
    if (++n < 14) requestAnimationFrame(step);
  })();
};
document.getElementById("b-time").onclick = () => {
  mood = (mood + 1) % MOODS.length;   // 庭はそのまま、太陽が動く
  drawSig(); render();
};
document.getElementById("b-save").onclick = () => {
  render();
  const t = document.createElement("canvas");
  t.width = canvas.width; t.height = canvas.height;
  const c = t.getContext("2d");
  c.drawImage(canvas, 0, 0);
  c.drawImage(sig, 0, 0);
  const a = document.createElement("a");
  a.download = "karesansui.png";
  a.href = t.toDataURL("image/png");
  a.click();
};

// ============ 起動 ============
function boot(){
  sizeCanvas();
  stones = [
    { x: W * 0.30, y: H * 0.36, r: 38, seed: 41.7 },
    { x: W * 0.68, y: H * 0.62, r: 30, seed: 8.2 }
  ];
  stones.forEach(s => stamp(1, { x: s.x, y: s.y }, { x: s.x, y: s.y }, { r0: s.r * 1.05, rings: 5 }));
  const steps = 30;
  let prev = { x: W * 0.12, y: H * 0.88 };
  for (let i = 1; i <= steps; i++){
    const t = i / steps;
    const p = { x: W * 0.12 + (W * 0.76) * t, y: H * 0.88 - (H * 0.72) * t + Math.sin(t * Math.PI) * 20 };
    stamp(0, prev, p); prev = p;
  }
  drawSig(); render();
}
try {
  if (!gl) throw new Error("no webgl2");
  initGL(); boot();
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(drawSig);
  window.addEventListener("resize", boot);
} catch(err){
  canvas.style.display = "none";
  document.getElementById("nogl").style.display = "block";
}
</script>
